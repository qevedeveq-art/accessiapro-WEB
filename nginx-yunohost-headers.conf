# ACCESSIA Pro - Nginx security headers (YunoHost reference)
# ------------------------------------------------------------
# This file is a REFERENCE only. YunoHost generates its own
# Nginx configuration at:
#   /etc/nginx/conf.d/<domain>.d/my_webapp.conf
#
# To apply these headers on the server, append a block similar
# to the one below inside the server { ... } stanza, then run:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Verify with:
#   curl -sI https://access-ia.pro/ | grep -iE 'strict|content-security|x-frame|referrer|permissions|x-content'

# --- Static asset hardening -------------------------------------------------
# Drop unwanted methods early.
if ($request_method !~ ^(GET|HEAD|POST|OPTIONS)$) {
    return 405;
}

# --- Security headers -------------------------------------------------------
add_header X-Content-Type-Options        "nosniff"                                                always;
add_header X-Frame-Options               "DENY"                                                   always;
add_header Referrer-Policy               "strict-origin-when-cross-origin"                        always;
add_header Permissions-Policy            "camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()" always;
add_header Strict-Transport-Security     "max-age=63072000; includeSubDomains; preload"           always;
add_header Cross-Origin-Opener-Policy    "same-origin"                                            always;
add_header Cross-Origin-Resource-Policy  "same-origin"                                            always;

# Content-Security-Policy
# Keep aligned with the <meta http-equiv="Content-Security-Policy"> in index.html
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data:; form-action 'self' mailto:; connect-src 'self'; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

# Hide server tokens (also set globally in /etc/nginx/nginx.conf via `server_tokens off;`)
server_tokens off;

# --- Block sensitive paths --------------------------------------------------
location ~ /\.(git|github|claude|env|DS_Store) {
    deny all;
    return 404;
}

location ~* \.(env|log|sh|bak|sql|ini|conf|lock|yml|yaml)$ {
    deny all;
    return 404;
}

# Allow .well-known explicitly (security.txt, ACME)
location ^~ /.well-known/ {
    default_type text/plain;
    allow all;
}

# --- Index directive (sert /articles/, /, etc.) ---------------------------
# Yunohost active généralement déjà cette directive ; rappel ici par sécurité.
index index.html;

# --- SEO redirects ----------------------------------------------------------
location = /articles/integrer-ia-pme.html {
    return 301 /guides/ia-pme/;
}

# Pretty URLs : essaie d'abord le fichier exact, puis index.html du dossier.
try_files $uri $uri/ $uri.html =404;

# --- Caching ----------------------------------------------------------------
location ~* \.(woff2|webp|png|jpg|jpeg|svg|ico|css|js)$ {
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    access_log off;
}

location ~* \.html$ {
    charset utf-8;
    expires 5m;
    add_header Cache-Control "public, max-age=300, must-revalidate" always;
}

# llms.txt et sitemap.xml : cache moyen (révisés régulièrement)
location = /llms.txt {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    add_header Content-Type "text/plain; charset=utf-8" always;
    add_header X-Robots-Tag "all" always;
}

location = /sitemap.xml {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate" always;
    add_header Content-Type "application/xml; charset=utf-8" always;
}

location = /robots.txt {
    expires 6h;
    add_header Cache-Control "public, max-age=21600" always;
    access_log off;
}

# Manifest PWA — content-type officiel
location = /manifest.webmanifest {
    add_header Content-Type "application/manifest+json; charset=utf-8" always;
    add_header Cache-Control "public, max-age=86400" always;
}

# security.txt (RFC 9116)
location = /.well-known/security.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=86400" always;
}

# --- Compression (à activer dans nginx.conf principal aussi) ---------------
# gzip & brotli pour les ressources textuelles
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_proxied any;
gzip_comp_level 6;
gzip_types
    text/plain
    text/css
    text/xml
    application/json
    application/javascript
    application/ld+json
    application/xml
    application/xml+rss
    image/svg+xml
    font/woff2;

# --- PHP handling for contact.php ------------------------------------------
# YunoHost already wires PHP-FPM; this is shown for completeness.
# Ensure PHP errors are NOT leaked in production (php.ini: display_errors=Off).
location = /contact.php {
    # Optional: limit POST size to mitigate abuse
    client_max_body_size 64k;
    include fastcgi_params;
    fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_pass   unix:/run/php/php-fpm-my_webapp.sock;
}
