name: Deploy — OVHcloud + GCS

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  SITE_DIR: /tmp/accessia-site
  GCS_BUCKET: gs://accessia-pro-web
  GCP_URL_MAP: accessia-pro-lb
  YNH_HOST: srv.access-ia.pro
  YNH_USER: qevedeveq
  YNH_STAGE_PATH: /home/qevedeveq/accessiapro-WEB-deploy/
  YNH_PATH: /var/www/my_webapp/www/

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & prepare deploy artifacts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deploy directory
        run: |
          rm -rf "$SITE_DIR"
          mkdir -p "$SITE_DIR"
          rsync -az \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.DS_Store' \
            --exclude='graphify-out/' \
            --exclude='node_modules/' \
            ./ "$SITE_DIR/"

      - name: Minify CSS and JS
        run: |
          npm install -g clean-css-cli uglify-js --silent
          cleancss "$SITE_DIR/assets/css/style.css" > /tmp/style.min.css
          mv /tmp/style.min.css "$SITE_DIR/assets/css/style.css"
          uglifyjs "$SITE_DIR/assets/js/main.v2.js" -c -m > /tmp/main.min.js
          mv /tmp/main.min.js "$SITE_DIR/assets/js/main.v2.js"

      - name: Minify HTML
        run: |
          npm install -g html-minifier-terser --silent
          find "$SITE_DIR" -name "*.html" | while read f; do
            html-minifier-terser \
              --collapse-whitespace \
              --remove-comments \
              --remove-optional-tags \
              --remove-redundant-attributes \
              --use-short-doctype \
              --minify-css true \
              --minify-js true \
              "$f" -o "$f"
          done

      - name: Subset fonts
        run: |
          pip install fonttools brotli --quiet
          python3 - <<'PYEOF'
          import os, re
          chars = set()
          site_dir = os.environ['SITE_DIR']
          for root, dirs, files in os.walk(site_dir):
              for f in files:
                  if f.endswith('.html'):
                      with open(os.path.join(root, f), encoding='utf-8', errors='ignore') as fh:
                          chars.update(re.sub('<[^>]+>', ' ', fh.read()))
          with open('/tmp/used_chars.txt', 'w') as out:
              out.write(''.join(sorted(chars)))
          PYEOF
          echo "Unique chars: $(wc -c < /tmp/used_chars.txt)"
          for weight in 400 500 600 700 800; do
            pyftsubset "$SITE_DIR/assets/fonts/inter-${weight}.woff2" \
              --text-file=/tmp/used_chars.txt \
              --flavor=woff2 \
              --output-file="/tmp/inter-${weight}.woff2" 2>/dev/null \
              && mv "/tmp/inter-${weight}.woff2" "$SITE_DIR/assets/fonts/inter-${weight}.woff2" \
              || echo "Subset skipped for inter-${weight}.woff2"
          done

      - name: Verify deploy directory
        run: |
          test -f "$SITE_DIR/index.html" || (echo "ERROR: index.html missing" && exit 1)
          test -f "$SITE_DIR/contact.php" || (echo "ERROR: contact.php missing" && exit 1)
          test -f "$SITE_DIR/sitemap.xml" || (echo "ERROR: sitemap.xml missing" && exit 1)
          test -f "$SITE_DIR/robots.txt" || (echo "ERROR: robots.txt missing" && exit 1)
          test -d "$SITE_DIR/assets" || (echo "ERROR: assets/ missing" && exit 1)
          test -d "$SITE_DIR/articles" || (echo "ERROR: articles/ missing" && exit 1)
          echo "Build verification PASSED"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: ${{ env.SITE_DIR }}
          retention-days: 1

  deploy-gcs:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Google Cloud Storage + CDN

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ${{ env.SITE_DIR }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Sync files to GCS bucket
        run: |
          gsutil -m rsync -r -d "$SITE_DIR" "$GCS_BUCKET"

      - name: Set content-type for fonts
        run: |
          gsutil -m setmeta \
            -h "Content-Type:font/woff2" \
            "$GCS_BUCKET/assets/fonts/*.woff2" || true

      - name: Set cache headers for static assets
        run: |
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            "$GCS_BUCKET/assets/css/style.css" \
            "$GCS_BUCKET/assets/js/main.v2.js" \
            "$GCS_BUCKET/assets/images/*.webp" \
            "$GCS_BUCKET/assets/images/*.png" \
            "$GCS_BUCKET/assets/images/*.jpg" \
            "$GCS_BUCKET/assets/fonts/*.woff2" || true
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            "$GCS_BUCKET/robots.txt" \
            "$GCS_BUCKET/sitemap.xml"
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=300, must-revalidate" \
            "$GCS_BUCKET/index.html" \
            "$GCS_BUCKET/404.html" \
            "$GCS_BUCKET/ressources.html" \
            "$GCS_BUCKET/conseil-ia-toulouse.html" \
            "$GCS_BUCKET/llms.txt" \
            "$GCS_BUCKET/contact.php"
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            "$GCS_BUCKET/articles/*.html" || true

      - name: Set security response headers on backend bucket
        run: |
          BACKEND=$(gcloud compute backend-buckets list \
            --format="value(name)" 2>/dev/null | grep -i accessia | head -1)
          if [ -n "$BACKEND" ]; then
            gcloud compute backend-buckets update "$BACKEND" \
              --custom-response-header='Strict-Transport-Security:max-age=63072000; includeSubDomains; preload' \
              --custom-response-header='X-Frame-Options:DENY' \
              --custom-response-header='X-Content-Type-Options:nosniff' \
              --custom-response-header='Referrer-Policy:strict-origin-when-cross-origin' \
              --custom-response-header='Permissions-Policy:camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()' \
              2>/dev/null && echo "Security headers applied to $BACKEND" \
              || echo "Could not update headers on $BACKEND — apply manually in GCP console"
          else
            echo "No backend bucket found — apply security headers manually in GCP console"
          fi

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache "$GCP_URL_MAP" \
            --path "/*" \
            --global \
            --async || echo "CDN invalidation skipped (LB may not be configured yet)"

  deploy-yunohost:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to YunoHost (OVHcloud)

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: site-build
          path: ${{ env.SITE_DIR }}

      - name: Setup SSH with hardened security
        env:
          SSH_PRIVATE_KEY: ${{ secrets.OVH_SSH_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          # Write private key
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Write pre-verified known_hosts (prevents MITM)
          echo "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

          # Verify known_hosts is not empty
          if [ ! -s ~/.ssh/known_hosts ]; then
            echo "::error::SSH_KNOWN_HOSTS secret is empty. See DEPLOY_SETUP.md for setup instructions."
            exit 1
          fi

          echo "SSH security setup complete"

      - name: Deploy directly to production
        env:
          DEPLOY_KEY_PATH: ~/.ssh/deploy_key
        run: |
          rsync -az --checksum --delete \
            -e "ssh -i $DEPLOY_KEY_PATH -o StrictHostKeyChecking=yes -o ConnectTimeout=10 -p 22" \
            "$SITE_DIR/" "$YNH_USER@$YNH_HOST:$YNH_PATH" \
            || {
              echo "::error::Deploy failed. Ensure qevedeveq owns $YNH_PATH on the server."
              echo "Run once on server: sudo chown -R qevedeveq:www-data $YNH_PATH && sudo chmod -R u=rwX,g=rX,o=rX $YNH_PATH"
              exit 1
            }
          echo "Production deploy completed successfully"

      - name: Verify production homepage
        run: |
          curl -fsSL https://access-ia.pro \
            | grep -F "Conseil IA pour PME" \
            && echo "Production verification PASSED" \
            || {
              echo "::error::Production verification FAILED"
              exit 1
            }
