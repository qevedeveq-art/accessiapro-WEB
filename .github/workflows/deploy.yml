name: Deploy to Google Cloud Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy static site to GCS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Minify CSS and JS
        run: |
          npm install -g clean-css-cli uglify-js --silent
          cleancss assets/css/style.css > /tmp/style.min.css && mv /tmp/style.min.css assets/css/style.css
          uglifyjs assets/js/main.v2.js -c -m > /tmp/main.min.js && mv /tmp/main.min.js assets/js/main.v2.js

      - name: Subset fonts
        run: |
          pip install fonttools brotli --quiet
          python3 - <<'PYEOF'
          import os, re, sys
          chars = set()
          for root, dirs, files in os.walk('.'):
              for f in files:
                  if f.endswith('.html'):
                      with open(os.path.join(root, f), encoding='utf-8', errors='ignore') as fh:
                          chars.update(re.sub('<[^>]+>', ' ', fh.read()))
          with open('/tmp/used_chars.txt', 'w') as out:
              out.write(''.join(sorted(chars)))
          PYEOF
          echo "Unique chars: $(wc -c < /tmp/used_chars.txt)"
          for weight in 400 500 600 700 800; do
            pyftsubset "assets/fonts/inter-${weight}.woff2" \
              --text-file=/tmp/used_chars.txt \
              --flavor=woff2 \
              --output-file="/tmp/inter-${weight}.woff2" 2>/dev/null \
              && mv "/tmp/inter-${weight}.woff2" "assets/fonts/inter-${weight}.woff2" \
              || echo "Subset skipped for inter-${weight}.woff2"
          done

      - name: Deploy files to GCS bucket
        run: |
          gsutil -m cp index.html gs://accessia-pro-web/
          gsutil -m cp 404.html gs://accessia-pro-web/
          gsutil -m cp robots.txt gs://accessia-pro-web/
          gsutil -m cp sitemap.xml gs://accessia-pro-web/
          gsutil -m cp -r assets/css gs://accessia-pro-web/assets/
          gsutil -m cp -r assets/js  gs://accessia-pro-web/assets/
          gsutil -m cp -r assets/images gs://accessia-pro-web/assets/
          gsutil -m cp -r assets/fonts gs://accessia-pro-web/assets/
          gsutil -m cp -r .well-known gs://accessia-pro-web/
          gsutil -m cp -r articles gs://accessia-pro-web/

      - name: Set content-type for fonts
        run: |
          gsutil -m setmeta \
            -h "Content-Type:font/woff2" \
            "gs://accessia-pro-web/assets/fonts/*.woff2" || true

      - name: Set cache headers for static assets
        run: |
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            gs://accessia-pro-web/assets/css/style.css \
            gs://accessia-pro-web/assets/js/main.v2.js \
            "gs://accessia-pro-web/assets/images/*.webp" \
            "gs://accessia-pro-web/assets/images/*.png" \
            "gs://accessia-pro-web/assets/images/*.jpg" \
            "gs://accessia-pro-web/assets/fonts/*.woff2" || true
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            gs://accessia-pro-web/robots.txt \
            gs://accessia-pro-web/sitemap.xml
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=300, must-revalidate" \
            gs://accessia-pro-web/index.html \
            gs://accessia-pro-web/404.html
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            "gs://accessia-pro-web/articles/*.html" || true

      - name: Set security response headers on backend bucket
        run: |
          BACKEND=$(gcloud compute backend-buckets list \
            --format="value(name)" 2>/dev/null | grep -i accessia | head -1)
          if [ -n "$BACKEND" ]; then
            gcloud compute backend-buckets update "$BACKEND" \
              --custom-response-header='Strict-Transport-Security:max-age=63072000; includeSubDomains; preload' \
              --custom-response-header='X-Frame-Options:DENY' \
              --custom-response-header='X-Content-Type-Options:nosniff' \
              --custom-response-header='Referrer-Policy:strict-origin-when-cross-origin' \
              --custom-response-header='Permissions-Policy:camera=(), microphone=(), geolocation=(), payment=(), interest-cohort=()' \
              2>/dev/null && echo "Security headers applied to $BACKEND" \
              || echo "Could not update headers on $BACKEND — apply manually in GCP console"
          else
            echo "No backend bucket found — apply security headers manually in GCP console"
          fi

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache accessia-pro-lb \
            --path "/*" \
            --global \
            --async || echo "CDN invalidation skipped (LB may not be configured yet)"
