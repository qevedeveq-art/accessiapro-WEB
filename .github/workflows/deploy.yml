name: Deploy to Google Cloud Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy static site to GCS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy files to GCS bucket
        run: |
          gsutil -m cp index.html gs://accessia-pro-web/
          gsutil -m cp 404.html gs://accessia-pro-web/
          gsutil -m cp robots.txt gs://accessia-pro-web/
          gsutil -m cp sitemap.xml gs://accessia-pro-web/
          gsutil -m cp -r assets/css gs://accessia-pro-web/assets/
          gsutil -m cp -r assets/js  gs://accessia-pro-web/assets/
          gsutil -m cp -r assets/images gs://accessia-pro-web/assets/
          gsutil -m cp -r assets/fonts gs://accessia-pro-web/assets/
          gsutil -m cp -r .well-known gs://accessia-pro-web/
          gsutil -m cp -r articles gs://accessia-pro-web/

      - name: Set content-type for fonts
        run: |
          gsutil -m setmeta \
            -h "Content-Type:font/woff2" \
            "gs://accessia-pro-web/assets/fonts/*.woff2" || true

      - name: Set cache headers for static assets
        run: |
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            gs://accessia-pro-web/assets/css/style.css \
            gs://accessia-pro-web/assets/js/main.v2.js \
            "gs://accessia-pro-web/assets/images/*.webp" \
            "gs://accessia-pro-web/assets/images/*.png" \
            "gs://accessia-pro-web/assets/images/*.jpg" \
            "gs://accessia-pro-web/assets/fonts/*.woff2" || true
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            gs://accessia-pro-web/robots.txt \
            gs://accessia-pro-web/sitemap.xml
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=300, must-revalidate" \
            gs://accessia-pro-web/index.html \
            gs://accessia-pro-web/404.html
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=3600, must-revalidate" \
            "gs://accessia-pro-web/articles/*.html" || true

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache accessia-pro-lb \
            --path "/*" \
            --global \
            --async || echo "CDN invalidation skipped (LB may not be configured yet)"
