name: Deploy to Google Cloud Storage

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy static site to GCS

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy files to GCS bucket
        run: |
          gsutil -m rsync -r -d \
            -x '\.github/|\.git/|README\.md' \
            . gs://accessia-pro-web/

      - name: Set cache headers for static assets
        run: |
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=31536000, immutable" \
            "gs://accessia-pro-web/assets/**"
          gsutil -m setmeta \
            -h "Cache-Control:public, max-age=300, must-revalidate" \
            gs://accessia-pro-web/index.html \
            gs://accessia-pro-web/404.html

      - name: Invalidate CDN cache
        run: |
          gcloud compute url-maps invalidate-cdn-cache accessia-pro-lb \
            --path "/*" \
            --global \
            --async || echo "CDN invalidation skipped (LB may not be configured yet)"
