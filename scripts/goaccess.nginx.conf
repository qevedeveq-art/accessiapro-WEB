# ACCESSIA Pro — Protection du rapport GoAccess
# À insérer dans /etc/nginx/conf.d/access-ia.pro.d/my_webapp.conf
# AVANT le bloc `location / { ... }` final.

location ^~ /analytics/ {
    auth_basic           "ACCESSIA Pro — Analytics";
    auth_basic_user_file /etc/nginx/.htpasswd-analytics;

    # Ne pas indexer ce chemin
    add_header X-Robots-Tag "noindex, nofollow, noarchive" always;

    # Pas de cache navigateur (données qui changent toutes les heures)
    add_header Cache-Control "private, no-store, no-cache, must-revalidate" always;

    # Inutile d'autoriser autre chose que GET/HEAD ici
    limit_except GET HEAD {
        deny all;
    }

    try_files $uri $uri/ =404;
}
