<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — ACCESSIA Pro</title>
  <link rel="icon" type="image/png" href="assets/images/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--navy-dark), var(--navy));
      text-align: center;
      padding: 24px;
    }
    .error-content { max-width: 480px; }
    .error-code { font-size: 7rem; font-weight: 800; color: var(--teal-light); line-height: 1; margin-bottom: 16px; }
    .error-title { color: var(--white); font-size: 1.8rem; margin-bottom: 16px; }
    .error-desc { color: rgba(255,255,255,.6); margin-bottom: 36px; }
  </style>
</head>
<body>
<main class="error-page">
  <div class="error-content">
    <div class="error-code">404</div>
    <h1 class="error-title">Page introuvable</h1>
    <p class="error-desc">Cette page n'existe pas ou a été déplacée. Retournez à l'accueil pour découvrir nos solutions IA.</p>
    <a href="/" class="btn btn-primary">← Retour à l'accueil</a>
  </div>
</main>
</body>
</html>
